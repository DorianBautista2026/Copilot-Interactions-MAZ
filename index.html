const D=JSON.parse(document.querySelector('#data').textContent),fmt=new Intl.NumberFormat('es-MX');let daily=D.daily.slice();const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const total=rows=>rows.reduce((a,r)=>a+(+r[1]||0),0);const date=s=>new Date(s+'T00:00:00');const df=new Intl.DateTimeFormat('es-MX',{day:'2-digit',month:'short',year:'numeric'});const ds=new Intl.DateTimeFormat('es-MX',{day:'2-digit',month:'short'});
function chart(id,rows,type='bar',color='#16697a',limit=12){const c=document.querySelector(id),b=c.getBoundingClientRect(),r=devicePixelRatio||1,w=Math.max(300,b.width),h=Math.max(220,b.height);c.width=w*r;c.height=h*r;const x=c.getContext('2d');x.scale(r,r);const p={l:58,r:15,t:15,b:70},cw=w-p.l-p.r,ch=h-p.t-p.b,vals=rows.map(v=>+v[1]),max=Math.max(...vals,1);x.font='11px system-ui';x.strokeStyle='#d8e2e7';x.fillStyle='#66737d';for(let i=0;i<5;i++){let y=p.t+ch-ch*i/4;x.beginPath();x.moveTo(p.l,y);x.lineTo(w-p.r,y);x.stroke();x.textAlign='right';x.fillText(fmt.format(Math.round(max*i/4)),p.l-7,y+3)}if(type==='line'){x.strokeStyle=color;x.lineWidth=2.5;x.beginPath();rows.forEach((v,i)=>{let xx=p.l+cw*i/Math.max(rows.length-1,1),yy=p.t+ch-v[1]/max*ch;i?x.lineTo(xx,yy):x.moveTo(xx,yy)});x.stroke();let step=Math.ceil(rows.length/8);rows.forEach((v,i)=>{if(i%step===0||i===rows.length-1){x.fillStyle='#66737d';x.textAlign='center';x.fillText(ds.format(date(v[0])),p.l+cw*i/Math.max(rows.length-1,1),h-30)}})}else{rows.slice(0,limit).forEach((v,i,a)=>{let gap=9,bw=(cw-gap*(a.length-1))/a.length,xx=p.l+i*(bw+gap),bh=v[1]/max*ch;x.fillStyle=color;x.fillRect(xx,p.t+ch-bh,bw,bh);x.save();x.translate(xx+bw/2,h-56);x.rotate(-.45);x.fillStyle='#66737d';x.textAlign='center';x.fillText(String(v[0]).slice(0,18),0,0);x.restore()})}}
function users(q=''){let rows=D.users.filter(r=>!q||((r[0]+' '+r[1]).toLowerCase().includes(q.toLowerCase())));document.querySelector('#users').innerHTML=rows.map((r,i)=>'<tr><td>'+(i+1)+'</td><td>'+esc(r[0])+'</td><td>'+esc(r[1])+'</td><td>'+esc(r[2])+'</td><td class="num">'+fmt.format(r[3])+'</td></tr>').join('')||'<tr><td colspan="5">Sin resultados</td></tr>'}
function render(){let t=total(daily);document.querySelector('#meta').innerHTML=df.format(date(D.meta.date_min))+' — '+df.format(date(D.meta.date_max))+'<br>'+fmt.format(D.meta.rows_valid)+' registros válidos';document.querySelector('#app').innerHTML='<section class="filters"><div class="field"><label>Desde</label><input id="from" type="date" value="'+daily[0][0]+'" min="'+D.meta.date_min+'" max="'+D.meta.date_max+'"></div><div class="field"><label>Hasta</label><input id="to" type="date" value="'+daily.at(-1)[0]+'" min="'+D.meta.date_min+'" max="'+D.meta.date_max+'"></div><div class="field"><label>Buscar usuario</label><input id="search" placeholder="Nombre o UPN"></div></section><section class="kpis"><div class="kpi"><span class="label">Interacciones</span><strong class="value">'+fmt.format(t)+'</strong></div><div class="kpi"><span class="label">Usuarios únicos</span><strong class="value">'+fmt.format(D.meta.unique_users)+'</strong></div><div class="kpi"><span class="label">App más usada</span><strong class="value">'+esc(D.apps[0][0])+'</strong></div><div class="kpi"><span class="label">Host principal</span><strong class="value">'+esc(D.hosts[0][0])+'</strong></div></section><section class="grid"><article class="panel wide"><h2>Tendencia diaria</h2><p>Interacciones registradas por fecha</p><canvas id="trend" class="chart"></canvas></article><article class="panel"><h2>Interacciones por app</h2><p>Aplicaciones con mayor actividad</p><canvas id="apps" class="chart"></canvas></article><article class="panel"><h2>Dónde se usa</h2><p>Interacciones por host</p><canvas id="hosts" class="chart"></canvas></article><article class="panel"><h2>País inferido</h2><p>Distribución disponible en la fuente</p><canvas id="countries" class="chart"></canvas></article><article class="panel"><h2>App y host</h2><p>Principales combinaciones</p><div class="table-wrap"><table><thead><tr><th>App</th><th>Host</th><th class="num">Interacciones</th></tr></thead><tbody>'+D.app_host.slice(0,15).map(r=>'<tr><td>'+esc(r[0])+'</td><td>'+esc(r[1])+'</td><td class="num">'+fmt.format(r[2])+'</td></tr>').join('')+'</tbody></table></div></article><article class="panel wide"><h2>Usuarios con más interacciones</h2><p>Top 100 usuarios</p><div class="table-wrap"><table><thead><tr><th>#</th><th>Usuario</th><th>UPN</th><th>Zona</th><th class="num">Interacciones</th></tr></thead><tbody id="users"></tbody></table></div></article></section><aside class="quality"><strong>Nota de calidad de datos:</strong> La información se actualizará conforme a lo establecido.</aside>';bind();draw();users()}
function draw(){chart('#trend',daily,'line');chart('#apps',D.apps);chart('#hosts',D.hosts,'bar','#2a9d8f');chart('#countries',D.countries,'bar','#e76f51',10)}function bind(){document.querySelector('#search').oninput=e=>users(e.target.value);const f=()=>{let a=document.querySelector('#from').value,b=document.querySelector('#to').value;daily=D.daily.filter(r=>r[0]>=a&&r[0]<=b);render()};document.querySelector('#from').onchange=f;document.querySelector('#to').onchange=f}function dl(c,t,n){let u=URL.createObjectURL(new Blob([c],{type:t})),a=document.createElement('a');a.href=u;a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}function exportExcel(){let tab=(title,head,rows)=>'<h2>'+title+'</h2><table border="1"><tr>'+head.map(x=>'<th>'+x+'</th>').join('')+'</tr>'+rows.map(r=>'<tr>'+r.map(x=>'<td>'+esc(x)+'</td>').join('')+'</tr>').join('')+'</table>';let h='<html><meta charset="utf-8"><body><h1>Dashboard de Interacciones Copilot</h1>'+tab('Tendencia',['Fecha','Interacciones'],daily)+tab('Apps',['App','Interacciones'],D.apps)+tab('Hosts',['Host','Interacciones'],D.hosts)+tab('Países',['País','Interacciones','Usuarios'],D.countries)+tab('Usuarios',['Usuario','UPN','Zona','Interacciones'],D.users)+'</body></html>';dl('﻿'+h,'application/vnd.ms-excel','dashboard_interacciones_copilot.xls')}let rt;onresize=()=>{clearTimeout(rt);rt=setTimeout(draw,100)};render();
</script></body></html>
