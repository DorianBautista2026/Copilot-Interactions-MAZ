","MAZ",1013],["Jazmin Garciacastro","co092858@gmodelo.com.mx","MAZ",1009],["Juan Ruiz","juanruiz@gmodelo.com.mx","MAZ",1008],["Frida Villarreal","frida.villarreal@gmodelo.com.mx","MAZ",997],["Adriana Malagon Cuevas","adriana.malagon@gmodelo.com.mx","MAZ",996],["Jose David Reyes Castro","jose.reyes1@gmodelo.com.mx","MAZ",993],["Gabriel Alvarengaflores","sv065417@gmodelo.com.mx","MAZ",983],["Pedro Mateo De La Rosa","do995308@gmodelo.com.mx","MAZ",980]]}</script>
  <script>
    const fmt=new Intl.NumberFormat('es-MX');
    const shortDate=new Intl.DateTimeFormat('es-MX',{day:'2-digit',month:'short'});
    const fullDate=new Intl.DateTimeFormat('es-MX',{day:'2-digit',month:'short',year:'numeric'});
    let DATA,filteredDaily;

    function escapeHtml(value){return String(value??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    function sum(rows,index=1){return rows.reduce((a,r)=>a+(Number(r[index])||0),0)}
    function parseDate(s){return new Date(`${s}T00:00:00`)}
    function pct(v,total){return total?`${(v/total*100).toFixed(1)}%`:'0.0%'}

    function drawChart(canvas,labels,values,{type='bar',color='#16697a',maxBars=12}={}){
      const dpr=window.devicePixelRatio||1,box=canvas.getBoundingClientRect(),w=Math.max(300,box.width),h=Math.max(220,box.height);canvas.width=w*dpr;canvas.height=h*dpr;const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,w,h);
      const pad={l:58,r:16,t:16,b:type==='line'?50:76},cw=w-pad.l-pad.r,ch=h-pad.t-pad.b,max=Math.max(...values,1),ticks=4;
      ctx.font='11px system-ui';ctx.fillStyle='#66737d';ctx.strokeStyle='#d8e2e7';ctx.lineWidth=1;
      for(let i=0;i<=ticks;i++){const y=pad.t+ch-(ch*i/ticks);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(fmt.format(Math.round(max*i/ticks)),pad.l-8,y)}
      if(type==='line'){
        ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.beginPath();values.forEach((v,i)=>{const x=pad.l+(cw*i/Math.max(values.length-1,1)),y=pad.t+ch-(v/max*ch);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();
        const step=Math.max(1,Math.ceil(labels.length/8));ctx.fillStyle='#66737d';ctx.textAlign='center';ctx.textBaseline='top';labels.forEach((l,i)=>{if(i%step===0||i===labels.length-1){const x=pad.l+(cw*i/Math.max(labels.length-1,1));ctx.fillText(l,x,pad.t+ch+12)}})
      }else{
        const n=Math.min(values.length,maxBars),gap=10,bw=Math.max(10,(cw-gap*(n-1))/n);ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='top';for(let i=0;i<n;i++){const x=pad.l+i*(bw+gap),bh=values[i]/max*ch,y=pad.t+ch-bh;ctx.fillRect(x,y,bw,bh);ctx.save();ctx.translate(x+bw/2,pad.t+ch+9);ctx.rotate(-Math.PI/5);ctx.fillStyle='#66737d';ctx.fillText(String(labels[i]).slice(0,18),0,0);ctx.restore();ctx.fillStyle=color}
      }
    }

    function render(){
      const m=DATA.meta,total=sum(filteredDaily),start=filteredDaily[0]?.[0],end=filteredDaily.at(-1)?.[0];
      const topApp=DATA.apps[0],topHost=DATA.hosts[0];
      document.querySelector('#meta').innerHTML=`${escapeHtml(fullDate.format(parseDate(m.date_min)))} — ${escapeHtml(fullDate.format(parseDate(m.date_max)))}<br>${fmt.format(m.rows_valid)} registros válidos`;
      document.querySelector('#app').innerHTML=`
        <section class="controls" aria-label="Filtros"><div class="control-group"><div class="field"><label for="from">Desde</label><input id="from" type="date" min="${m.date_min}" max="${m.date_max}" value="${start}"></div><div class="field"><label for="to">Hasta</label><input id="to" type="date" min="${m.date_min}" max="${m.date_max}" value="${end}"></div><div class="field"><label for="userSearch">Buscar usuario</label><input id="userSearch" type="search" placeholder="Nombre o UPN"></div></div><div class="kpi-note">La fuente contiene una zona: <strong>MAZ</strong></div></section>
        <section class="kpis"><article class="kpi"><span class="kpi-label">Interacciones del periodo</span><strong class="kpi-value">${fmt.format(total)}</strong><span class="kpi-note">${escapeHtml(start)} a ${escapeHtml(end)}</span></article><article class="kpi"><span class="kpi-label">Usuarios únicos</span><strong class="kpi-value">${fmt.format(m.unique_users)}</strong><span class="kpi-note">En toda la fuente</span></article><article class="kpi"><span class="kpi-label">App más usada</span><strong class="kpi-value">${escapeHtml(topApp[0])}</strong><span class="kpi-note">${pct(topApp[1],m.total_interactions)} del total</span></article><article class="kpi"><span class="kpi-label">Host principal</span><strong class="kpi-value">${escapeHtml(topHost[0])}</strong><span class="kpi-note">${pct(topHost[1],m.total_interactions)} del total</span></article></section>
        <section class="grid"><article class="panel wide"><div class="panel-head"><div><h2>Tendencia diaria de interacciones</h2><p>Volumen registrado por fecha en la zona MAZ</p></div><div class="legend"><span><i class="dot"></i>Interacciones</span></div></div><canvas id="trend" class="chart" role="img" aria-label="Gráfico de tendencia diaria"></canvas></article>
        <article class="panel"><div class="panel-head"><div><h2>Interacciones por app</h2><p>Aplicaciones ordenadas por actividad</p></div></div><canvas id="apps" class="chart" role="img" aria-label="Gráfico de interacciones por app"></canvas></article>
        <article class="panel"><div class="panel-head"><div><h2>Dónde se usa</h2><p>Interacciones por host o superficie</p></div></div><canvas id="hosts" class="chart" role="img" aria-label="Gráfico de interacciones por host"></canvas></article>
        <article class="panel"><div class="panel-head"><div><h2>País inferido</h2><p>Solo UPN con código reconocible; el resto queda sin identificar</p></div></div><canvas id="countries" class="chart" role="img" aria-label="Gráfico de interacciones por país inferido"></canvas></article>
        <article class="panel"><div class="panel-head"><div><h2>Combinaciones app-host</h2><p>Principales lugares de uso para cada aplicación</p></div></div><div class="table-wrap"><table><thead><tr><th>App</th><th>Host</th><th class="num">Interacciones</th></tr></thead><tbody>${DATA.app_host.slice(0,12).map(r=>`<tr><td>${escapeHtml(r[0])}</td><td>${escapeHtml(r[1])}</td><td class="num">${fmt.format(r[2])}</td></tr>`).join('')}</tbody></table></div></article>
        <article class="panel wide"><div class="panel-head"><div><h2>Usuarios con más interacciones</h2><p id="userCount">Top 100 de la fuente</p></div></div><div class="table-wrap"><table><thead><tr><th>#</th><th>Usuario</th><th>UPN</th><th>Zona</th><th class="num">Interacciones</th><th>Intensidad</th></tr></thead><tbody id="userRows"></tbody></table></div></article></section>
        <aside class="quality"><strong>Nota de calidad de datos:</strong> La información se actualizará conforme a lo establecido.</aside>`;
      bind();drawAll();renderUsers('');
    }

    function renderUsers(query){const q=query.trim().toLowerCase(),rows=DATA.users.filter(r=>!q||`${r[0]} ${r[1]}`.toLowerCase().includes(q)),max=DATA.users[0]?.[3]||1;document.querySelector('#userCount').textContent=q?`${rows.length} coincidencias`:'Top 100 de la fuente';document.querySelector('#userRows').innerHTML=rows.length?rows.map((r,i)=>`<tr><td class="rank">${i+1}</td><td>${escapeHtml(r[0])}</td><td>${escapeHtml(r[1])}</td><td>${escapeHtml(r[2])}</td><td class="num">${fmt.format(r[3])}</td><td class="bar-cell"><div class="mini-bar"><span style="width:${Math.max(2,r[3]/max*100)}%"></span></div></td></tr>`).join(''):`<tr><td colspan="6" class="empty">Sin coincidencias</td></tr>`}
    function drawAll(){drawChart(document.querySelector('#trend'),filteredDaily.map(r=>shortDate.format(parseDate(r[0]))),filteredDaily.map(r=>r[1]),{type:'line'});drawChart(document.querySelector('#apps'),DATA.apps.map(r=>r[0]),DATA.apps.map(r=>r[1]),{color:'#16697a'});drawChart(document.querySelector('#hosts'),DATA.hosts.map(r=>r[0]),DATA.hosts.map(r=>r[1]),{color:'#2a9d8f'});drawChart(document.querySelector('#countries'),DATA.countries.map(r=>r[0]),DATA.countries.map(r=>r[1]),{color:'#e76f51',maxBars:10})}
    function bind(){document.querySelector('#userSearch').addEventListener('input',e=>renderUsers(e.target.value));const change=()=>{const from=document.querySelector('#from').value,to=document.querySelector('#to').value;filteredDaily=DATA.daily.filter(r=>r[0]>=from&&r[0]<=to);render()};document.querySelector('#from').addEventListener('change',change);document.querySelector('#to').addEventListener('change',change);let timer;window.onresize=()=>{clearTimeout(timer);timer=setTimeout(drawAll,120)}}
    try{DATA=JSON.parse(document.querySelector('#dashboard-data').textContent);filteredDaily=DATA.daily.slice();render()}catch(error){document.querySelector('#app').innerHTML=`<div class="error"><strong>No fue posible cargar el dashboard.</strong><br>${escapeHtml(error.message)}</div>`}
  </script>
